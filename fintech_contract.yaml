#
# DATA CONTRACT: FinTech Transaction Log
#
dataContractSpecification: 0.9.3
id: urn:datacontract:fintech:fraud-detection-stream
version: 1.0.0

# 1. OWNERSHIP & GOVERNANCE
info:
  title: "Real-Time Transaction Stream"
  description: |
    Financial transaction logs scanned by the Fraud Detection System.
    Strict formatting required for legacy lookup compatibility.
  owner: "Core Banking Team"
  contact:
    name: "Fraud Ops Lead"
    email: "security-ops@bank.com"
  classification: restricted
  tags: [financial, fraud, compliance, critical]

# 2. SCHEMA DEFINITION (Logical Contract)
schema:
  type: object
  properties:
    source_account_id:
      type: string
      pattern: "^[A-Z0-9]{10}$"
      description: "Source Account ID. Must be exactly 10 uppercase alphanumeric chars."
      pii: true
      # physical_mapping: acct_src
    destination_account_id:
      type: string
      description: "Destination Account ID."
      pii: true
      # physical_mapping: acct_dest
    transaction_timestamp:
      type: string
      format: date-time
      description: "Time of transaction occurrence."
      pii: false
      # physical_mapping: tx_ts
  required:
    - source_account_id
    - destination_account_id
    - transaction_timestamp

# 3. SERVICE LEVEL AGREEMENTS (SLAs)
sla:
  freshness:
    threshold: "1 second"
    description: "Real-time required for fraud interception."

# 4. DATA QUALITY RULES
quality:
  - name: account_id_format_strict
    type: validity
    # Regex: Start(^), A-Z or 0-9, exactly 10 times {10}, End($)
    expression: "REGEXP_LIKE(source_account_id, '^[A-Z0-9]{10}$')"
    threshold: "100%"
    enforcement: hard
    description: |
      HARD CIRCUIT BREAKER: Account IDs must be exactly 10 uppercase alphanumeric characters.
      Violations must block the pipeline to prevent silent fraud model failures.